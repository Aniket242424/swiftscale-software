<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="80" rx="12" fill="#0F172A"/>
  
  <!-- Logo Container -->
  <g transform="translate(20, 20)">
    <!-- SS Icon with Gradient Background -->
    <defs>
      <linearGradient id="ssGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- SS Icon Background -->
    <rect x="0" y="0" width="40" height="40" rx="8" fill="url(#ssGradient)"/>
    
    <!-- SS Text -->
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">SS</text>
    
    <!-- Accent Line -->
    <rect x="5" y="35" width="30" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>
    
    <!-- Floating Particles -->
    <circle cx="45" cy="5" r="2" fill="#10B981" opacity="0.6"/>
    <circle cx="50" cy="35" r="1.5" fill="#8B5CF6" opacity="0.6"/>
  </g>
  
  <!-- Company Name -->
  <text x="80" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10B981">SwiftScale</text>
  <text x="80" y="50" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">Software</text>
</svg>
