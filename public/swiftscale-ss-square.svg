<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="75" cy="75" r="70" fill="#0F172A" stroke="#10B981" stroke-width="3"/>
  
  <!-- SS Icon with Gradient Background -->
  <defs>
    <linearGradient id="ssGradientSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- SS Icon Background -->
  <rect x="45" y="45" width="60" height="60" rx="12" fill="url(#ssGradientSquare)"/>
  
  <!-- SS Text -->
  <text x="75" y="90" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">SS</text>
  
  <!-- Accent Line -->
  <rect x="50" y="100" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  
  <!-- Floating Particles -->
  <circle cx="30" cy="30" r="3" fill="#10B981" opacity="0.6"/>
  <circle cx="120" cy="120" r="2" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="25" cy="125" r="2.5" fill="#10B981" opacity="0.4"/>
  <circle cx="125" cy="25" r="2" fill="#8B5CF6" opacity="0.4"/>
</svg>
