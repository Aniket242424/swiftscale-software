<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #0F172A; color: white; }
        .form-container { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            background: rgba(255,255,255,0.1);
            color: white;
        }
        button { 
            background: linear-gradient(135deg, #14B8A6, #8B5CF6); 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            width: 100%;
        }
        button:hover { opacity: 0.9; }
        .success { color: #10B981; margin-top: 10px; }
        .error { color: #EF4444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Contact Form Test</h1>
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone *</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="projectType">Project Type *</label>
                <select id="projectType" name="projectType" required>
                    <option value="">Select project type</option>
                    <option value="Website Development">Website Development</option>
                    <option value="Mobile App Development">Mobile App Development</option>
                    <option value="Custom Software">Custom Software</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Project Details *</label>
                <textarea id="message" name="message" rows="4" required></textarea>
            </div>
            
            <button type="submit">Book a Free Consultation</button>
        </form>
        
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            console.log('Form submitted!');
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            console.log('Form data:', data);
            
            // Show success message
            document.getElementById('result').innerHTML = 
                '<div class="success">✅ Thank you! Your message has been sent successfully. We\'ll get back to you within 24 hours.</div>';
            
            // Reset form
            this.reset();
        });
    </script>
</body>
</html>
